# After changes land on the default branch (e.g. merging a PR), refresh GitHub issues
# for pending dex moves, pokemon forms, and types so the issue list matches lib/dex/*.ts.
name: Sync issues

on:
  push:
    branches: [master]

# Serialize runs so two pushes (or overlapping jobs) cannot both see "no open issue" for the
# same work item and create duplicates before either run finishes.
concurrency:
  group: sync-issues-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Close duplicate workflow issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run cleanup:workflow-issues:live

      - name: Sync move issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:move-issues:live

      - name: Sync pokemon form issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:pokemon-form-issues:live

      - name: Sync type issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:type-issues:live
